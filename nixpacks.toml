[phases.setup]
nixPkgs = ['php82', 'nodejs_18', 'npm', 'bash', 'apache2']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci',
    'npm run build'
]

[phases.build]
cmds = [
    'chmod +x start.sh',
    'chmod +x start-apache.sh',
    'chmod -R 755 storage',
    'chmod -R 755 bootstrap/cache'
]

[start]
cmd = 'bash start.sh' 